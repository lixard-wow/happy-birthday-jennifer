<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Happy Birthday Jennifer!</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"><\/script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff4d8d;
      --hot:    #ff0066;
      --purple: #aa00ff;
      --teal:   #00d4aa;
      --gold:   #ffd700;
      --orange: #ff7f00;
      --yellow: #ffe600;
      --light:  #fff0f8;
      --dark:   #1a0030;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: Nunito, sans-serif;
      background: var(--light);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ══ SPARKLE CANVAS ══ */
    #sparkle-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ══ SPLASH ══ */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #1a0030 0%, #4a0080 40%, #aa00ff 70%, #ff4d8d 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.9s ease;
      text-align: center;
      padding: 20px;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .splash-rings {
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,77,141,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,212,170,0.12) 0%, transparent 50%);
    }
    #splash .gift { font-size: clamp(4rem, 15vw, 7rem); animation: giftBounce 1.2s infinite; margin-bottom: 16px; position: relative; z-index: 1; }
    @keyframes giftBounce {
      0%,100% { transform: translateY(0) rotate(-3deg) scale(1); }
      50%      { transform: translateY(-18px) rotate(3deg) scale(1.08); }
    }
    #splash h2 {
      font-family: Dancing Script, cursive;
      font-size: clamp(2.2rem, 8vw, 5rem);
      color: white;
      text-shadow: 0 0 30px rgba(255,77,141,0.8), 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    #splash p {
      color: rgba(255,255,255,0.8);
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 600;
      margin-bottom: 36px;
      max-width: 380px;
      position: relative; z-index: 1;
    }
    #splash .open-btn {
      padding: 18px 48px;
      border: 3px solid var(--gold);
      background: rgba(255,215,0,0.15);
      color: var(--gold);
      border-radius: 60px;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      font-weight: 900;
      cursor: pointer;
      font-family: Nunito, sans-serif;
      letter-spacing: 1px;
      transition: all 0.25s;
      animation: fadeUp 1s ease 0.5s both;
      position: relative; z-index: 1;
      box-shadow: 0 0 30px rgba(255,215,0,0.3);
    }
    #splash .open-btn:hover, #splash .open-btn:active {
      background: var(--gold);
      color: #1a0030;
      transform: scale(1.06);
      box-shadow: 0 0 50px rgba(255,215,0,0.6);
    }

    /* ══ MUSIC BAR ══ */
    #music-bar {
      position: fixed; bottom: 16px; right: 16px; z-index: 999;
      display: flex; align-items: center; gap: 10px;
      background: rgba(26,0,48,0.9);
      backdrop-filter: blur(12px);
      border: 2px solid var(--pink);
      border-radius: 50px;
      padding: 10px 18px;
      box-shadow: 0 4px 24px rgba(255,77,141,0.4);
      cursor: pointer;
      transition: transform 0.2s;
      max-width: calc(100vw - 32px);
    }
    #music-bar:hover { transform: scale(1.05); }
    #music-bar .note { font-size: 1.3rem; animation: bounce 0.9s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
    #music-bar span { font-size: 0.82rem; font-weight: 800; color: var(--pink); line-height: 1.2; }
    #yt-player { display: none; }

    /* ══ HERO ══ */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 80px 20px 60px;
      background: linear-gradient(160deg,
        #ff9de2 0%, #ffb3ec 15%, #d4b3ff 35%,
        #b3d4ff 55%, #b3ffee 75%, #ffe8b3 100%);
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

    .balloon {
      position: absolute; bottom: -140px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      animation: floatUp linear infinite;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-6deg); opacity: 1; }
      50%  { transform: translateY(-50vh) rotate(6deg); }
      100% { transform: translateY(-115vh) rotate(-6deg); opacity: 0; }
    }
    .star {
      position: absolute;
      font-size: 1.2rem;
      animation: starTwinkle 2s ease-in-out infinite;
      pointer-events: none;
      opacity: 0;
    }
    @keyframes starTwinkle {
      0%,100% { opacity: 0; transform: scale(0.5); }
      50%      { opacity: 1; transform: scale(1.2); }
    }

    #hero .badge {
      background: linear-gradient(135deg, var(--hot), var(--orange));
      color: white;
      font-size: clamp(0.75rem, 2.5vw, 0.95rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 24px;
      border-radius: 40px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(255,0,102,0.4);
      animation: fadeUp 0.8s ease both;
      position: relative; z-index: 1;
    }
    #hero h1 {
      font-family: Dancing Script, cursive;
      font-size: clamp(3.5rem, 12vw, 8rem);
      line-height: 1.05;
      background: linear-gradient(135deg, var(--hot) 0%, var(--purple) 50%, var(--teal) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 12px rgba(170,0,255,0.3));
      animation: fadeUp 0.9s ease 0.15s both;
      position: relative; z-index: 1;
    }
    #hero .hero-emoji {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      margin: 16px 0;
      animation: popIn 0.7s cubic-bezier(.175,.885,.32,1.275) 0.4s both;
      position: relative; z-index: 1;
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    #hero .tagline {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #4a0070;
      max-width: 500px;
      font-weight: 800;
      line-height: 1.6;
      animation: fadeUp 0.9s ease 0.6s both;
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      padding: 12px 24px;
      border-radius: 20px;
      margin-top: 8px;
    }
    .hero-btn {
      margin-top: 28px;
      padding: 16px 44px;
      border: none;
      background: linear-gradient(135deg, var(--hot), var(--purple));
      color: white;
      border-radius: 60px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 30px rgba(255,0,102,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.9s ease 0.8s both;
      font-family: Nunito, sans-serif;
      position: relative; z-index: 1;
    }
    .hero-btn:hover, .hero-btn:active { transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 40px rgba(255,0,102,0.55); }

    /* ══ AGE BANNER ══ */
    #age-banner {
      background: linear-gradient(135deg, var(--dark), #3a0060);
      padding: 48px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    #age-banner::before {
      content: '🎂🎉🎈🎊🥳🎂🎉🎈🎊🥳🎂🎉🎈🎊🥳';
      position: absolute; top: 0; left: 0; right: 0;
      font-size: 1.5rem; letter-spacing: 8px;
      opacity: 0.15; line-height: 2;
      white-space: nowrap; overflow: hidden;
    }
    #age-banner .age-number {
      font-family: Dancing Script, cursive;
      font-size: clamp(5rem, 20vw, 11rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--orange), var(--hot));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 20px rgba(255,215,0,0.4));
      position: relative; z-index: 1;
    }
    #age-banner .age-label {
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: rgba(255,255,255,0.85);
      font-weight: 800;
      margin-top: -8px;
      position: relative; z-index: 1;
    }
    #age-banner .age-sub {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--teal);
      font-weight: 700;
      margin-top: 8px;
      position: relative; z-index: 1;
      font-style: italic;
    }

    /* ══ REASONS ══ */
    #reasons {
      padding: 72px 20px;
      background: linear-gradient(180deg, #fff0f8 0%, #f0e8ff 100%);
      text-align: center;
    }
    #reasons h2 {
      font-family: Dancing Script, cursive;
      font-size: clamp(2.2rem, 7vw, 4rem);
      background: linear-gradient(135deg, var(--hot), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    #reasons .section-sub { color: #888; font-size: 1rem; margin-bottom: 44px; font-style: italic; }
    .reasons-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; max-width: 900px; margin: 0 auto; }
    .reason-card {
      background: white;
      border-radius: 24px;
      padding: 28px 20px;
      box-shadow: 0 6px 24px rgba(170,0,255,0.1);
      border: 2px solid transparent;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative; overflow: hidden;
    }
    .reason-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--hot), var(--purple), var(--teal));
    }
    .reason-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--pink);
      box-shadow: 0 16px 40px rgba(255,77,141,0.2);
    }
    .reason-card .icon { font-size: 2.8rem; margin-bottom: 12px; display: block; }
    .reason-card h3 { font-size: 1.05rem; font-weight: 900; color: var(--hot); margin-bottom: 8px; }
    .reason-card p { font-size: 0.92rem; color: #555; line-height: 1.55; }

    /* ══ SLIDESHOW ══ */
    #slideshow-section {
      padding: 0;
      background: linear-gradient(180deg, #1a0030, #0d001a);
      position: relative; overflow: hidden;
    }
    #slideshow-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(170,0,255,0.12) 0%, transparent 70%);
    }
    .slideshow-header { text-align: center; padding: 52px 20px 28px; position: relative; z-index: 1; }
    .slideshow-header h2 {
      font-family: Dancing Script, cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
    }
    .slideshow-header p { color: rgba(255,255,255,0.45); font-style: italic; margin-top: 6px; font-size: 0.95rem; }
    .slideshow-track {
      display: flex; align-items: center; justify-content: center;
      position: relative; height: 500px; overflow: hidden;
      padding: 0 20px;
    }
    .slide {
      position: absolute;
      width: min(320px, 80vw);
      height: min(400px, 70vw + 80px);
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      border: 3px solid rgba(255,77,141,0.5);
      transition: transform 0.65s cubic-bezier(.77,0,.18,1), opacity 0.65s ease;
    }
    .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slide .slide-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white; padding: 36px 16px 16px;
      font-family: Dancing Script, cursive;
      font-size: 1.4rem; text-align: center;
    }
    .slide.state-enter  { transform: translateX(110%); opacity: 0; }
    .slide.state-active { transform: translateX(0);    opacity: 1; }
    .slide.state-exit   { transform: translateX(-110%); opacity: 0; }
    .slide.state-behind { transform: translateX(110%); opacity: 0; transition: none; }
    .slide-dots { display: flex; justify-content: center; gap: 10px; padding: 20px 0 48px; position: relative; z-index: 1; }
    .slide-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background 0.3s, transform 0.3s; cursor: pointer; }
    .slide-dot.active { background: var(--pink); transform: scale(1.4); }

    /* ══ MESSAGE ══ */
    #message {
      background: linear-gradient(160deg, #2d0050, #0d001a 40%, #001a20 100%);
      padding: 80px 20px;
      text-align: center; color: white;
      position: relative; overflow: hidden;
    }
    #message::before {
      content: '💕 💕 💕 💕 💕 💕 💕 💕 💕 💕 💕 💕';
      position: absolute; top: 16px; left: 0; right: 0;
      font-size: 1.5rem; letter-spacing: 16px; opacity: 0.08;
      white-space: nowrap; overflow: hidden;
      animation: scrollText 20s linear infinite;
    }
    @keyframes scrollText { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    #message h2 {
      font-family: Dancing Script, cursive;
      font-size: clamp(2rem, 7vw, 4rem);
      color: var(--gold);
      text-shadow: 0 0 24px rgba(255,215,0,0.4);
      margin-bottom: 36px;
      position: relative; z-index: 1;
    }
    #message .letter {
      max-width: 620px; margin: 0 auto;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 2; color: rgba(255,255,255,0.9);
      position: relative; z-index: 1;
    }
    #message .letter p { margin-bottom: 20px; }
    #message .signature {
      font-family: Dancing Script, cursive;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      background: linear-gradient(135deg, var(--pink), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 36px;
      position: relative; z-index: 1;
      display: block;
    }

    /* ══ SONG ══ */
    #song-section {
      padding: 80px 20px;
      text-align: center;
      background: linear-gradient(160deg, #fff0f8, #f5e8ff);
    }
    #song-section h2 {
      font-family: Dancing Script, cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      background: linear-gradient(135deg, var(--hot), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    #song-section p { color: #888; font-style: italic; margin-bottom: 32px; font-size: 1rem; }
    .song-card {
      display: inline-flex; align-items: center; gap: 18px;
      background: white;
      border-radius: 24px; padding: 20px 36px;
      box-shadow: 0 8px 40px rgba(170,0,255,0.15);
      cursor: pointer;
      border: 2px solid transparent;
      background-clip: padding-box;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      max-width: 90vw;
    }
    .song-card::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 26px;
      background: linear-gradient(135deg, var(--hot), var(--purple), var(--teal));
      z-index: -1;
    }
    .song-card:hover { transform: scale(1.04); box-shadow: 0 16px 60px rgba(170,0,255,0.25); }
    .song-card .play-btn {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--hot), var(--purple));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(255,0,102,0.4);
    }
    .song-card .song-info { text-align: left; }
    .song-card .song-title { font-weight: 900; font-size: 1.05rem; color: var(--dark); }
    .song-card .song-artist { font-size: 0.85rem; color: #888; margin-top: 3px; }

    /* ══ FOOTER ══ */
    footer {
      text-align: center; padding: 48px 20px;
      background: var(--dark);
      color: rgba(255,255,255,0.45); font-size: 0.9rem;
    }
    footer .footer-emojis { font-size: 1.6rem; margin-bottom: 10px; letter-spacing: 6px; }
    footer span { color: var(--pink); }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn    { from { opacity:0; transform:scale(0.4) rotate(-15deg); } to { opacity:1; transform:scale(1) rotate(0deg); } }
    .reveal { opacity: 0; transform: translateY(36px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @media (max-width: 600px) {
      #hero { padding: 70px 16px 50px; }
      .reasons-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .reason-card { padding: 20px 14px; }
      .reason-card .icon { font-size: 2rem; }
      .slideshow-track { height: 400px; }
      #music-bar { bottom: 12px; right: 12px; padding: 8px 14px; }
      #music-bar span { font-size: 0.75rem; }
      .song-card { padding: 16px 20px; gap: 14px; }
      #age-banner .age-number { font-size: clamp(4rem, 25vw, 8rem); }
    }
    @media (max-width: 400px) {
      .reasons-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<canvas id="sparkle-canvas"></canvas>

<div id="splash" onclick="openSurprise()">
  <div class="splash-rings"></div>
  <div class="gift">&#127873;</div>
  <h2>You Have a Surprise!</h2>
  <p>Someone who loves you very much made this just for you &#128149;</p>
  <button class="open-btn">&#10024; Open Your Surprise &#10024;</button>
</div>

<div id="yt-player"></div>
<div id="music-bar" onclick="toggleMusic()">
  <span class="note" id="music-note">&#127926;</span>
  <span id="music-label">Now Playing &#9836;</span>
</div>

<section id="hero">
  <div class="balloon" style="left:3%;animation-duration:7s;animation-delay:0s">&#127880;</div>
  <div class="balloon" style="left:12%;animation-duration:10s;animation-delay:1.2s">&#127873;</div>
  <div class="balloon" style="left:22%;animation-duration:8s;animation-delay:0.4s">&#127881;</div>
  <div class="balloon" style="left:35%;animation-duration:12s;animation-delay:2s">&#127872;</div>
  <div class="balloon" style="left:50%;animation-duration:9s;animation-delay:0.8s">&#127880;</div>
  <div class="balloon" style="left:63%;animation-duration:7.5s;animation-delay:3s">&#127881;</div>
  <div class="balloon" style="left:75%;animation-duration:11s;animation-delay:1.5s">&#127873;</div>
  <div class="balloon" style="left:86%;animation-duration:8.5s;animation-delay:0.2s">&#127880;</div>
  <div class="balloon" style="left:94%;animation-duration:10s;animation-delay:2.5s">&#127872;</div>
  <div class="star" style="top:10%;left:8%;animation-delay:0s">&#11088;</div>
  <div class="star" style="top:20%;left:90%;animation-delay:0.6s">&#10024;</div>
  <div class="star" style="top:60%;left:5%;animation-delay:1.2s">&#11088;</div>
  <div class="star" style="top:70%;left:92%;animation-delay:0.3s">&#10024;</div>
  <div class="star" style="top:40%;left:95%;animation-delay:0.9s">&#11088;</div>
  <div class="badge">&#127874; Turning 44 &amp; Still Fabulous &#127874;</div>
  <h1>Happy Birthday<br>Jennifer!</h1>
  <div class="hero-emoji">&#129395; &#127882; &#127874; &#127882; &#129395;</div>
  <p class="tagline">44 years of being absolutely wonderful.<br>And yes, you still look amazing &#128521;</p>
  <button class="hero-btn" onclick="launchConfetti()">&#127881; Let's Celebrate! &#127881;</button>
</section>

<div id="age-banner">
  <div class="age-number reveal">44</div>
  <div class="age-label reveal">Years of Being Amazing</div>
  <div class="age-sub reveal">Born April 4, 1982 &mdash; Happy Birthday Jennifer! &#127874;</div>
</div>

<section id="reasons">
  <h2 class="reveal">Why You Are Amazing</h2>
  <p class="section-sub reveal">...just a few of the many, many reasons</p>
  <div class="reasons-grid">
    <div class="reason-card reveal"><span class="icon">&#128150;</span><h3>Heart of Our Home</h3><p>You hold this family together with love, patience, and the occasional "don't make me come in there!"</p></div>
    <div class="reason-card reveal"><span class="icon">&#128514;</span><h3>Funniest in the Room</h3><p>Whether you're trying or not - honestly, half the time that makes it even better.</p></div>
    <div class="reason-card reveal"><span class="icon">&#127775;</span><h3>Superwoman in Disguise</h3><p>You do the work of ten people and still somehow find time to make everyone feel loved.</p></div>

<script>
  let player, musicPlaying = false, shouldPlayOnReady = false;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      height:'0', width:'0', videoId:'8-vZlrBYLSU',
      playerVars:{autoplay:0, controls:0},
      events:{ onReady: function() { if (shouldPlayOnReady) startMusic(); } }
    });
  }
  const ytTag = document.createElement('script');
  ytTag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytTag);

  function openSurprise() {
    const splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(() => splash.style.display = 'none', 950);
    if (player && typeof player.playVideo === 'function') {
      startMusic();
    } else {
      shouldPlayOnReady = true;
    }
    try { launchConfetti(); } catch(e) {}
  }

  function startMusic() {
    player.playVideo();
    musicPlaying = true;
    document.getElementById('music-note').innerHTML = '&#127926;';
    document.getElementById('music-label').textContent = 'Now Playing \u266a';
    document.getElementById('play-icon').innerHTML = '&#9646;&#9646;';
    startSlideshow();
  }

  function toggleMusic() {
    if (!player) return;
    if (musicPlaying) {
      player.pauseVideo(); musicPlaying = false;
      stopSlideshow();
      document.getElementById('music-note').innerHTML = '&#127925;';
      document.getElementById('music-label').textContent = 'Play Our Song';
      document.getElementById('play-icon').innerHTML = '&#9654;&#65039;';
    } else {
      player.playVideo(); musicPlaying = true;
      startSlideshow();
      document.getElementById('music-note').innerHTML = '&#127926;';
      document.getElementById('music-label').textContent = 'Now Playing \u266a';
      document.getElementById('play-icon').innerHTML = '&#9646;&#9646;';
    }
  }

  function launchConfetti() {
    if (typeof confetti === 'undefined') return;
    const end = Date.now() + 4500;
    const colors = ['#ff4d8d','#aa00ff','#ffd700','#00d4aa','#ff7f00','#ff0066'];
    (function frame() {
      confetti({ particleCount:7, angle:60,  spread:60, origin:{x:0}, colors });
      confetti({ particleCount:7, angle:120, spread:60, origin:{x:1}, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }

  let currentSlide = 0, slideTimer = null;
  const totalSlides = 6;

  function goToSlide(next) {
    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.slide-dot');
    const prev   = currentSlide;
    if (next === prev) return;
    slides[prev].className = 'slide state-exit';
    slides[next].className = 'slide state-enter';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      slides[next].className = 'slide state-active';
    }));
    setTimeout(() => { slides[prev].className = 'slide state-behind'; }, 700);
    dots[prev].classList.remove('active');
    dots[next].classList.add('active');
    currentSlide = next;
  }

  function startSlideshow() {
    if (slideTimer) return;
    slideTimer = setInterval(() => goToSlide((currentSlide + 1) % totalSlides), 3500);
  }
  function stopSlideshow() { clearInterval(slideTimer); slideTimer = null; }

  (function() {
    const canvas = document.getElementById('sparkle-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const COLORS = ['#ff4d8d','#aa00ff','#ffd700','#00d4aa','#ff7f00','#ffb3ec'];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    for (let i = 0; i < 55; i++) {
      particles.push({ x: Math.random()*1000, y: Math.random()*1000, r: Math.random()*3+1,
        dx: (Math.random()-0.5)*0.6, dy: (Math.random()-0.5)*0.6,
        alpha: Math.random(), dalpha: (Math.random()*0.015+0.005)*(Math.random()<0.5?1:-1),
        color: COLORS[Math.floor(Math.random()*COLORS.length)] });
    }
    function draw() {
      ctx.clearRect(0,0,W,H);
      particles.forEach(p => {
        p.x=(p.x+p.dx+W)%W; p.y=(p.y+p.dy+H)%H;
        p.alpha+=p.dalpha; if(p.alpha>1||p.alpha<0) p.dalpha*=-1;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,Math.min(1,p.alpha))*0.55; ctx.fill();
      });
      ctx.globalAlpha=1; requestAnimationFrame(draw);
    }
    draw();
  })();

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);} });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
